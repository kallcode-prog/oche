<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oche — Dart scorer</title>
<style>
  :root{
    --bg:#0B0E13; --glow:rgba(52,211,153,.07);
    --surface:#141A21; --surface2:#1C232D; --surface3:#28323E; --accent:#34D399;
    --accent2:#22B98A; --accent-ink:#04231A; --sec:#56C7FB; --warn:#FBBF24; --danger:#F87171;
    --txt:#F4F7FA; --txt2:#97A1B0; --txt3:#5C6675; --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.15);
    --radius:16px; --shadow:0 2px 10px rgba(0,0,0,.35); --nav-bg:rgba(20,26,33,.82);
  }
  [data-theme="light"]{
    --bg:#F4F6F9; --glow:rgba(14,159,110,.06);
    --surface:#FFFFFF; --surface2:#EEF1F5; --surface3:#E2E8EF; --accent:#0E9F6E;
    --accent2:#0B8A5F; --accent-ink:#FFFFFF; --sec:#0284C7; --warn:#B45309; --danger:#DC2626;
    --txt:#0E1116; --txt2:#5A6472; --txt3:#9098A4; --border:rgba(15,23,32,.10); --border2:rgba(15,23,32,.16);
    --shadow:0 2px 10px rgba(15,23,32,.08); --nav-bg:rgba(255,255,255,.82);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(125% 55% at 50% -8%, var(--glow), transparent 62%), var(--bg);
    background-attachment:fixed; color:var(--txt);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-variant-numeric:tabular-nums; overscroll-behavior:none; -webkit-font-smoothing:antialiased;
  }
  #app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding-bottom:88px}
  #app.nonav{padding-bottom:0}
  #app.game{padding-bottom:0;min-height:0;height:100vh;height:100dvh;overflow:hidden}
  @media (hover:hover) and (pointer:fine){
    body.playing{display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh}
    #app.game{height:min(100vh,780px);height:min(100dvh,780px)}
  }
  #app.game .scorehero .rem{font-size:clamp(40px,9vh,74px)}
  #app.game .scorehero{padding:2px 0 2px}
  #app.game .scorehero .who{font-size:12px}
  #app.game .gametop{padding:10px 16px 4px}
  #app.game .players{padding:2px 16px 6px}
  #app.game .dartslots{padding:2px 16px 6px}
  #app.game .dartgrid{flex:1;min-height:0;grid-template-rows:repeat(4,1fr)}
  #app.game .dartgrid button{padding:0;display:flex;align-items:center;justify-content:center}
  #app.game .dartspecial{padding:8px 16px max(14px,env(safe-area-inset-bottom))}
  #app.cam{padding-bottom:0;min-height:0;height:100vh;height:100dvh;overflow:hidden}
  .camwrap{position:relative;width:100%;height:100%;background:#000;overflow:hidden}
  #camvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  #camcanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:manipulation;cursor:crosshair}
  .camtop{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:12px 14px;background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);color:#fff;z-index:3}
  .camtop .ttl{font-weight:700}
  .camtop .x{width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.3);background:rgba(0,0,0,.35);color:#fff;font-size:20px;cursor:pointer}
  .cambar{position:absolute;left:0;right:0;bottom:0;padding:14px 16px max(16px,env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(0,0,0,.72),transparent);z-index:3}
  #camstatus{color:#fff;font-weight:600;text-align:center;margin-bottom:10px;text-shadow:0 1px 4px rgba(0,0,0,.7)}
  #cambtns{display:flex;gap:8px}
  #cambtns .btn{flex:1;margin:0}
  .view{flex:1;padding:16px}
  h1,h2,h3{margin:0;font-weight:600}
  button{font-family:inherit}
  .muted{color:var(--txt2);font-size:13px}
  .label{color:var(--txt2);font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:10px}
  .row{display:flex;gap:8px;align-items:center}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 6px}
  .topbar .logo{font-size:26px;font-weight:800;letter-spacing:-.02em}
  .topbar .logo b{color:var(--accent)}
  .topbar .sub{font-size:12px;color:var(--txt2);margin-top:1px}
  .iconbtn{background:var(--surface2);border:1px solid var(--border);color:var(--txt);width:42px;height:42px;border-radius:12px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
  .iconbtn:active{transform:scale(.93)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
  .btn{display:block;width:100%;padding:15px;border-radius:14px;border:none;cursor:pointer;font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-ink);transition:.15s;box-shadow:0 6px 18px -6px var(--accent)}
  .btn:active{transform:scale(.985)}
  .btn.secondary{background:var(--surface2);color:var(--txt);border:1px solid var(--border2);box-shadow:none}
  .btn.ghost{background:transparent;color:var(--txt2);border:1px solid var(--border);box-shadow:none}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--border);box-shadow:none}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{flex:1;min-width:64px;text-align:center;padding:12px 8px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--txt2);cursor:pointer;font-size:15px;font-weight:600;transition:.15s}
  .chip:active{transform:scale(.97)}
  .chip.on{border-color:var(--accent);color:var(--accent);background:rgba(52,211,153,.13)}
  .stepper{display:flex;align-items:center;gap:12px}
  .stepper button{width:42px;height:42px;border-radius:12px;border:1px solid var(--border2);background:var(--surface2);color:var(--txt);font-size:20px;cursor:pointer;transition:.15s}
  .stepper button:active{transform:scale(.92)}
  .stepper .val{font-size:20px;font-weight:700;min-width:28px;text-align:center}
  input.txt{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--txt);font-size:16px;font-family:inherit;transition:.15s}
  input.txt:focus{outline:none;border-color:var(--accent)}
  .playerrow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .playerrow input{flex:1}
  .playerrow .rm{width:46px;height:48px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--danger);font-size:18px;cursor:pointer}
  /* nav */
  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;max-width:560px;margin:0 auto;z-index:20;padding-bottom:env(safe-area-inset-bottom,0)}
  .nav button{position:relative;flex:1;background:none;border:none;color:var(--txt2);padding:12px 0 14px;cursor:pointer;font-size:11px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.15s}
  .nav button .ico{font-size:21px;line-height:1;width:auto;height:auto;background:none;border:none;border-radius:0}
  .nav button.on{color:var(--accent)}
  .nav button.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:3px;border-radius:0 0 3px 3px;background:var(--accent)}
  /* game */
  .gametop{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px}
  .pill{font-size:12px;color:var(--txt2);background:var(--surface2);padding:7px 14px;border-radius:999px;font-weight:600;border:1px solid var(--border)}
  .scorehero{text-align:center;padding:6px 0 4px}
  .scorehero .who{font-size:13px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .scorehero .rem{font-size:78px;font-weight:800;line-height:1;letter-spacing:-.04em;margin-top:2px}
  .scorehero .rem.buffer{color:var(--sec)}
  .scorehero .co{margin-top:9px;min-height:26px;display:flex;flex-direction:column;gap:5px;align-items:center}
  .coroute{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
  .coroute .x{background:rgba(52,211,153,.13);color:var(--accent);font-weight:700;font-size:13px;padding:4px 10px;border-radius:8px;border:1px solid var(--accent)}
  .coroute.alt .x{background:transparent;color:var(--txt2);border-color:var(--border2);font-weight:600}
  .players{display:flex;gap:8px;overflow-x:auto;padding:4px 16px 10px}
  .pcard{flex:0 0 auto;min-width:100px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 14px;transition:.15s}
  .pcard.active{border-color:var(--accent);background:rgba(52,211,153,.09);box-shadow:0 6px 18px -8px var(--accent)}
  .pcard .nm{font-size:13px;font-weight:600;white-space:nowrap}
  .pcard .pr{font-size:28px;font-weight:800;line-height:1.1}
  .pcard.active .pr{color:var(--accent)}
  .pcard .meta{font-size:11px;color:var(--txt2);margin-top:2px}
  .quick{display:flex;gap:6px;padding:6px 16px;overflow-x:auto}
  .quick button{flex:0 0 auto;background:var(--surface2);border:1px solid var(--border);color:var(--txt);border-radius:11px;padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;transition:.12s}
  .quick button:active{transform:scale(.95)}
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:8px 16px 16px}
  .numpad button{padding:18px 0;font-size:24px;font-weight:700;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--txt);cursor:pointer;transition:.12s}
  .numpad button:active{transform:scale(.96);background:var(--surface3)}
  .numpad .enter{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-ink);border:none}
  .numpad .back{color:var(--warn)}
  /* dart-by-dart input */
  .dartslots{display:flex;gap:8px;justify-content:center;padding:2px 16px 10px}
  .dchip{min-width:58px;text-align:center;padding:8px 10px;border-radius:11px;border:1px dashed var(--border2);color:var(--txt2);font-weight:700;font-size:15px;transition:.15s}
  .dchip.on{border-style:solid;border-color:var(--accent);color:var(--accent);background:rgba(52,211,153,.10)}
  .multrow{display:flex;gap:8px;padding:2px 16px 6px}
  .multbtn{flex:1;padding:13px 0;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--txt);font-size:15px;font-weight:600;cursor:pointer;transition:.12s}
  .multbtn:active{transform:scale(.97)}
  .multbtn.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-ink);border:none}
  .dartgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:4px 16px}
  .dartgrid button{padding:15px 0;font-size:18px;font-weight:700;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--txt);cursor:pointer;transition:.12s}
  .dartgrid button:active{transform:scale(.95);background:var(--surface3)}
  .dartspecial{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:8px 16px 18px}
  .dartspecial button{padding:15px 2px;font-size:14px;font-weight:600;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--txt);cursor:pointer;transition:.12s}
  .dartspecial button:active{transform:scale(.95)}
  .dartspecial .back{color:var(--warn)}
  .recrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
  .recrow:last-of-type{border-bottom:none}
  .recreset{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--danger);font-size:16px;cursor:pointer}
  .dist{display:flex;flex-direction:column;gap:9px}
  .distrow{display:flex;align-items:center;gap:10px;font-size:13px}
  .distlbl{width:64px;color:var(--txt2);font-weight:500}
  .distbar{flex:1;height:14px;background:var(--surface2);border-radius:7px;overflow:hidden}
  .distbar span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:7px}
  .distval{width:30px;text-align:right;font-weight:700}
  .ptable{width:100%;border-collapse:collapse;font-size:14px}
  .ptable th{text-align:left;color:var(--txt2);font-weight:600;font-size:12px;padding:7px 4px;border-bottom:1px solid var(--border)}
  .ptable td{padding:9px 4px;border-bottom:1px solid var(--border)}
  .ptable tr:last-child td{border-bottom:none}
  .toggle{padding:8px 20px;border-radius:999px;border:1px solid var(--border2);background:var(--surface2);color:var(--txt2);font-weight:600;cursor:pointer;font-size:13px;transition:.15s}
  .toggle.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-ink);border:none}
  .celebrate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:80;font-size:100px;font-weight:800;color:var(--accent);pointer-events:none;animation:pop 1.1s ease-out forwards;text-shadow:0 10px 50px rgba(52,211,153,.45)}
  @keyframes pop{0%{transform:scale(.3);opacity:0}20%{transform:scale(1.12);opacity:1}70%{transform:scale(1);opacity:1}100%{transform:scale(1.25);opacity:0}}
  .celebrate.c140{color:var(--sec);font-size:84px;text-shadow:0 10px 50px rgba(86,199,251,.45)}
  .celebrate.c100{color:var(--warn);font-size:72px;text-shadow:none}
  .celebrate.word{font-size:46px;font-weight:800;color:var(--accent);text-shadow:0 10px 50px rgba(52,211,153,.45)}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:90;overflow:hidden}
  .confetti i{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.85}}
  /* stats */
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--surface2);border-radius:13px;padding:13px 14px}
  .stat .v{font-size:24px;font-weight:800;letter-spacing:-.02em}
  .stat .k{font-size:12px;color:var(--txt2);margin-top:2px}
  .histitem{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px 14px;border:1px solid var(--border);border-radius:13px;margin-bottom:8px;background:var(--surface);box-shadow:var(--shadow)}
  .histitem .meta{font-size:12px;color:var(--txt2);margin-top:2px}
  .badge{background:rgba(52,211,153,.16);color:var(--accent);font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .empty{text-align:center;color:var(--txt2);padding:48px 20px}
  .empty .big{font-size:44px;opacity:.4;margin-bottom:10px}
  /* overlay */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .sheet{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:22px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .sheet h3{margin-bottom:16px}
  .toast{position:fixed;left:50%;top:18px;transform:translateX(-50%);background:var(--danger);color:#fff;padding:11px 20px;border-radius:999px;font-weight:600;z-index:60;box-shadow:0 6px 24px rgba(0,0,0,.4)}
  .toast.ok{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-ink)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .menuitem{display:flex;align-items:center;gap:13px;padding:14px;border:1px solid var(--border);border-radius:15px;background:var(--surface);cursor:pointer;margin-bottom:10px;font-size:16px;font-weight:600;transition:.15s;box-shadow:var(--shadow)}
  .menuitem:active{transform:scale(.99)}
  .grid2 .menuitem{flex-direction:column;gap:8px;text-align:center;padding:18px 12px}
  .ico{flex:0 0 auto;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(52,211,153,.12);border:1px solid var(--border)}
  .atc-target{font-size:72px;font-weight:800;text-align:center;color:var(--accent);letter-spacing:-.03em}
  @supports ((-webkit-background-clip:text) or (background-clip:text)){
    .topbar .logo b,.atc-target{background:linear-gradient(135deg,var(--accent),var(--sec));-webkit-background-clip:text;background-clip:text;color:transparent}
  }
  /* — finputs: animationer, hover, fokus, glas-nav — */
  @keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes sheetIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
  .view{animation:viewIn .2s ease both}
  .toast{animation:toastIn .24s cubic-bezier(.2,.8,.2,1) both}
  .overlay{animation:fadeIn .16s ease both}
  .sheet{animation:sheetIn .22s cubic-bezier(.2,.8,.2,1) both}
  :focus-visible{outline:none}
  button:focus-visible,input:focus-visible{box-shadow:0 0 0 3px rgba(52,211,153,.4)}
  @supports ((backdrop-filter:blur(8px)) or (-webkit-backdrop-filter:blur(8px))){
    .nav{background:var(--nav-bg);-webkit-backdrop-filter:saturate(1.4) blur(14px);backdrop-filter:saturate(1.4) blur(14px)}
  }
  @media (hover:hover) and (pointer:fine){
    .menuitem{transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease}
    .menuitem:hover{transform:translateY(-2px);border-color:var(--border2);box-shadow:0 10px 26px -12px rgba(0,0,0,.55)}
    .btn:hover{filter:brightness(1.05)}
    .btn.secondary:hover,.btn.ghost:hover{filter:none;border-color:var(--accent);color:var(--accent)}
    .btn.danger:hover{filter:none;border-color:var(--danger);background:rgba(248,113,113,.08)}
    .chip:hover{border-color:var(--border2)}
    .iconbtn:hover{background:var(--surface3);border-color:var(--border2)}
    .nav button:hover{color:var(--txt)}
    .dartgrid button:hover,.numpad button:hover,.multbtn:hover,.quick button:hover,.dartspecial button:hover{background:var(--surface3);border-color:var(--border2)}
    .recreset:hover{border-color:var(--danger)}
    .toggle:hover{border-color:var(--border2)}
    .stepper button:hover{border-color:var(--border2)}
  }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
/* ============================ Oche — offline dart scorer ============================ */
const $ = (s,r=document)=>r.querySelector(s);
const fmt1 = n => (Math.round(n*10)/10).toFixed(1);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const OMOJLIGA_DO = new Set([159,162,163,165,166,168,169]);
const OMOJLIGA_SCORE = new Set([163,166,169,172,173,175,176,178,179]);

/* ---- storage ---- */
const DB = {
  load(k,def){ try{return JSON.parse(localStorage.getItem('oche.'+k)) ?? def;}catch{return def;} },
  save(k,v){ localStorage.setItem('oche.'+k, JSON.stringify(v)); },
};

/* ---- checkout calculator ---- */
const SCORING = [['T20',60],['T19',57],['T18',54],['T17',51],['Bull',50],['T16',48],
  ['T15',45],['T14',42],['S20',20],['S19',19],['S18',18],['S17',17],['S16',16],['S5',5],['S1',1]];
function slutkast(kvar, regel){
  if(regel==='double'){ if(kvar===50)return'Bull'; if(kvar<=40&&kvar%2===0)return'D'+(kvar/2); return null; }
  if(regel==='master'){ if(kvar===50)return'Bull'; if(kvar<=40&&kvar%2===0)return'D'+(kvar/2);
    if(kvar<=60&&kvar%3===0)return'T'+(kvar/3); return null; }
  if(kvar===25||kvar===50)return'Bull'; if(kvar<=20)return'S'+kvar;
  if(kvar<=40&&kvar%2===0)return'D'+(kvar/2); if(kvar<=60&&kvar%3===0)return'T'+(kvar/3); return null;
}
function sokMedPilar(kvar,regel,pilar){
  if(pilar===1){ const s=slutkast(kvar,regel); return s?[s]:null; }
  for(const [et,po] of SCORING){ if(po>=kvar)continue; const rest=sokMedPilar(kvar-po,regel,pilar-1); if(rest)return[et,...rest]; }
  return null;
}
function checkout(kvar,regel,pilarKvar=3){
  if(kvar<2||kvar>170)return[];
  if(regel==='double'&&OMOJLIGA_DO.has(kvar))return[];
  for(let p=1;p<=pilarKvar;p++){ const v=sokMedPilar(kvar,regel,p); if(v)return v; }
  return [];
}
/* flera checkout-vägar — populära avslut (D16, D20 …) prioriterade */
const PREF_DOUBLES=[16,20,8,12,10,18,14,4,2,6,11,19,17,15,13,9,7,5,3,1];
const PRE_FIELDS=(function(){ const a=[]; for(let n=20;n>=1;n--)a.push(['T'+n,3*n]); a.push(['Bull',50]); for(let n=20;n>=1;n--)a.push(['S'+n,n]); a.push(['25',25]); return a; })();
function comboExact(summa,pilar){
  if(pilar===0) return summa===0?[]:null;
  for(const [et,po] of PRE_FIELDS){ if(po>summa) continue; const rest=comboExact(summa-po,pilar-1); if(rest) return [et,...rest]; }
  return null;
}
function routeForFinish(kvar,finLabel,finVal,pilarKvar){
  if(kvar<finVal) return null;
  const pre=kvar-finVal;
  if(pre===0) return pilarKvar>=1?[finLabel]:null;
  for(let p=1;p<=pilarKvar-1;p++){ const c=comboExact(pre,p); if(c) return [...c,finLabel]; }
  return null;
}
function checkoutOptions(kvar,regel,pilarKvar=3,max=3){
  const primary=checkout(kvar,regel,pilarKvar);
  if(!primary.length) return [];
  const routes=[], seen=new Set();
  const add=r=>{ if(!r||!r.length) return; const k=r.join(' '); if(seen.has(k)) return; seen.add(k); routes.push(r); };
  add(primary);
  const minLen=primary.length, fins=[];
  if(regel!=='single'){ for(const n of PREF_DOUBLES) fins.push(['D'+n,2*n]); fins.push(['Bull',50]); }
  if(regel==='master'){ for(let n=20;n>=1;n--) fins.push(['T'+n,3*n]); }
  if(regel==='single'){ for(let n=20;n>=1;n--) fins.push(['S'+n,n]); for(const n of PREF_DOUBLES) fins.push(['D'+n,2*n]); fins.push(['Bull',50]); }
  for(const [lab,val] of fins){ if(routes.length>=max) break; const r=routeForFinish(kvar,lab,val,pilarKvar); if(r&&r.length===minLen) add(r); }
  for(const [lab,val] of fins){ if(routes.length>=max) break; const r=routeForFinish(kvar,lab,val,pilarKvar); if(r&&r.length<=minLen+1) add(r); }
  return routes.slice(0,max);
}

/* ---- match simulation (recompute everything from the turn log) ---- */
function simulate(match){
  const cfg=match.config, n=cfg.players.length;
  const rem=cfg.players.map(()=>cfg.startScore);
  const legDarts=cfg.players.map(()=>0);
  const stats=cfg.players.map(()=>({score:0,darts:0,c180:0,c140:0,c100:0,highCO:0,bestLeg:null,worstLeg:null,legsWon:0,setsWon:0,doubleAtt:0,doubleHit:0,bands:[0,0,0,0,0,0],first9:0,first9d:0,wonLegSum:0,checkouts:[]}));
  const legTurns=cfg.players.map(()=>0);
  let setWins=Array(n).fill(0), legWins=Array(n).fill(0);
  let legCount=0, cur=0, setNumber=1, finished=false, winner=null;

  for(const t of match.turns){
    if(finished) break;
    const p=cur, st=stats[p];
    if(t.throws){ let rb=rem[p];
      for(const td of t.throws){ const onD=(rb<=40&&rb%2===0)||rb===50;
        if(onD){ st.doubleAtt++; if(td.db && rb-td.v===0) st.doubleHit++; } rb-=td.v; if(rb<0) break; } }
    if(t.bust){ const dd=t.darts||3; st.darts+=dd; legDarts[p]+=dd; st.bands[5]++; if(legTurns[p]<3) st.first9d+=dd; legTurns[p]++; cur=(cur+1)%n; continue; }
    const newRem=rem[p]-t.score;
    st.score+=t.score; st.darts+=t.darts; legDarts[p]+=t.darts;
    if(t.score===180)st.c180++; if(t.score>=140)st.c140++; if(t.score>=100)st.c100++;
    if(t.score===180) st.bands[0]++; else if(t.score>=140) st.bands[1]++; else if(t.score>=100) st.bands[2]++; else if(t.score>=60) st.bands[3]++; else st.bands[4]++;
    if(legTurns[p]<3){ st.first9+=t.score; st.first9d+=t.darts; } legTurns[p]++;
    if(newRem===0){
      st.highCO=Math.max(st.highCO,t.score);
      st.legsWon++; legWins[p]++;
      st.bestLeg = st.bestLeg===null? legDarts[p] : Math.min(st.bestLeg,legDarts[p]);
      st.worstLeg = st.worstLeg===null? legDarts[p] : Math.max(st.worstLeg,legDarts[p]);
      st.wonLegSum += legDarts[p]; st.checkouts.push(t.score);
      if(legWins[p]>=cfg.legs){ setWins[p]++; st.setsWon=setWins[p]; legWins=Array(n).fill(0); setNumber++;
        if(setWins[p]>=cfg.sets){ finished=true; winner=p; }
      }
      // reset leg
      for(let i=0;i<n;i++){ rem[i]=cfg.startScore; legDarts[i]=0; legTurns[i]=0; }
      legCount++; cur=legCount%n;
      continue;
    }
    rem[p]=newRem; cur=(cur+1)%n;
  }
  stats.forEach((st,i)=>{ st.setsWon=setWins[i]; st.avg = st.darts? st.score/st.darts*3 : 0; });
  const legsInSet = legWins.reduce((a,b)=>a+b,0);
  return {rem,cur,setWins,legWins,stats,finished,winner,setNumber,
          legNumber:legsInSet+1, n};
}

  const m=state.match, sim=simulate(m);
  if(sim.finished){ saveMatch(m,sim); state.view='summary'; return viewSummary(sim); }
  const cur=sim.cur;
  const startRem=sim.rem[cur];
  const used=state.darts.reduce((a,d)=>a+d.val,0);
  const curRem=startRem-used;
  const coOpts=checkoutOptions(curRem, m.config.outRule, 3-state.darts.length, 3);
  const name=m.config.players[cur];
  const slots=[0,1,2].map(i=>{ const d=state.darts[i];
    return `<span class="dchip ${d?'on':''}">${d?d.label:'&middot;'}</span>`; }).join('');
  const mult=state.mult;
  return `<div class="gametop">
      <button class="iconbtn" onclick="quitGame()" title="Avsluta">&times;</button>
      <div class="pill">Set ${sim.setNumber} &middot; Leg ${sim.legNumber}</div>

      ${m.config.players.map((p,i)=>`<div class="pcard ${i===cur?'active':''}">
        <div class="nm">${esc(p)}</div>
        <div class="pr">${i===cur?curRem:sim.rem[i]}</div>
        <div class="meta">snitt ${fmt1(sim.stats[i].avg)} &middot; ${sim.legWins[i]}L</div>
      </div>`).join('')}
    </div>
    <div class="scorehero" style="padding-bottom:2px">
      <div class="who">${esc(name)}</div>
      <div class="rem">${curRem}</div>
      <div class="co">${coOpts.map((r,i)=>`<div class="coroute${i?' alt':''}">${r.map(x=>`<span class="x">${x}</span>`).join('')}</div>`).join('')}</div>

    </div>`;

  const sim=simulate(m); const w=sim.winner!=null?m.config.players[sim.winner]:'avbruten';
  const d=new Date(m.date); const ds=d.toLocaleDateString('sv-SE')+' '+d.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  return `<div class="histitem">
    <div style="min-width:0"><div style="font-weight:600">${esc(m.config.players.join(', '))}</div>
    <div class="meta">${m.config.startScore} &middot; ${ruleName(m.config.outRule)} out &middot; ${ds}</div></div>
    <div class="row" style="gap:8px;flex:0 0 auto"><div class="badge">&#127942; ${esc(w)}</div>
    ${deletable?`<button class="recreset" title="Radera match" onclick="deleteMatch('${m.id}',${m.date})">&times;</button>`:''}</div>

}
function deleteMatch(id,date){
  if(!confirm('Radera den här matchen?')) return;
  const hist=DB.load('matches',[]).filter(m=>!(m.id===id && m.date===date));
  DB.save('matches',hist); toast('Match raderad',true); render();
}

/* ============================== kamera (beta) ============================== */
/* Tavlans geometri i mm + kalibreringspunkter (ytterkant double): 20, 6, 3, 11 */
const CALIB_SRC=[[0,170],[170,0],[0,-170],[-170,0]];
const CALIB_PROMPTS=['20 (toppen)','6 (höger)','3 (botten)','11 (vänster)'];
const DART_NUMBERS=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
/* tavlans koordinat (mm) -> fält */
function boardToField(x,y){
  const r=Math.hypot(x,y);
  if(r>170) return {label:'Miss',val:0,seg:0,mult:'S',isDouble:false,isTreble:false};
  if(r<=6.35) return {label:'Bull',val:50,seg:25,mult:'D',isDouble:true,isTreble:false};
  if(r<=15.9) return {label:'Outer',val:25,seg:25,mult:'S',isDouble:false,isTreble:false};
  const th=Math.atan2(y,x)*180/Math.PI;
  const k=(((Math.round((90-th)/18))%20)+20)%20;
  const seg=DART_NUMBERS[k];
  if(r>162) return {label:'D'+seg,val:seg*2,seg,mult:'D',isDouble:true,isTreble:false};
  if(r>99&&r<=107) return {label:'T'+seg,val:seg*3,seg,mult:'T',isDouble:false,isTreble:true};
  return {label:'S'+seg,val:seg,seg,mult:'S',isDouble:false,isTreble:false};
}
function pxToBoard(points,W,H,px,py){
  const dst=points.slice(0,4).map(n=>[n[0]*W,n[1]*H]);
  return applyH(solveH(dst,CALIB_SRC), px,py);
}
function fieldText(f){
  if(f.label==='Miss') return 'Miss';
  if(f.seg===25) return f.isDouble?'Bull = 50':'Outer = 25';
  return ({S:'Single',D:'Dubbel',T:'Trippel'}[f.mult])+' '+f.seg+' = '+f.val;
}

function openCamera(){ camState.scoring=false; camState.lastTap=null; go('camera'); }
function openCameraScoring(){ camState.scoring=true; camState.turnMarks=[]; camState.turnEnded=false; camState.lastTap=null; go('camera'); }
function stopCam(){ stopDetect(); camState.auto=false; if(camState.stream){ camState.stream.getTracks().forEach(t=>t.stop()); camState.stream=null; } if(camState.redraw) window.removeEventListener('resize', camState.redraw); }

/* — auto-detektering (frame-diff), experimentell — */
function grabFrame(){
  const vid=camState.vid, canvas=camState.canvas, proc=camState.proc;
  if(!vid||!canvas||!proc||!vid.videoWidth) return null;
  const vw=vid.videoWidth, vh=vid.videoHeight, dw=canvas.width, dh=canvas.height;
  const s=Math.max(dw/vw, dh/vh), sW=dw/s, sH=dh/s, sx=(vw-sW)/2, sy=(vh-sH)/2;
  const p=proc.getContext('2d'); p.drawImage(vid,sx,sy,sW,sH,0,0,proc.width,proc.height);
  return p.getImageData(0,0,proc.width,proc.height);
}
function diffFrame(ref,cur){
  const a=ref.data,b=cur.data,w=cur.width,h=cur.height; let c=0,sx=0,sy=0,minx=w,miny=h,maxx=0,maxy=0;
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){ const i=(y*w+x)*4;
    const la=a[i]*.299+a[i+1]*.587+a[i+2]*.114, lb=b[i]*.299+b[i+1]*.587+b[i+2]*.114;
    if(Math.abs(la-lb)>30){ c++; sx+=x; sy+=y; if(x<minx)minx=x; if(x>maxx)maxx=x; if(y<miny)miny=y; if(y>maxy)maxy=y; } }
  return c? {count:c,cx:sx/c,cy:sy/c,bw:maxx-minx,bh:maxy-miny} : {count:0,cx:0,cy:0,bw:0,bh:0};
}
function rearmRef(){ camState.refData=grabFrame(); if(camState.det) camState.det.stableCount=0; }
function startDetect(){
  const canvas=camState.canvas; if(!canvas) return;
  const proc=document.createElement('canvas');
  proc.width=200; proc.height=Math.max(120,Math.round(200*(canvas.height||1)/(canvas.width||1)));
  camState.proc=proc; camState.refData=null; camState.suggestion=null;
  camState.det={stableCount:0,last:null,globalCount:0};
  setTimeout(()=>{ camState.refData=grabFrame(); },500);
  camState.detTimer=setInterval(detectTick,130);
}
function stopDetect(){ if(camState.detTimer){ clearInterval(camState.detTimer); camState.detTimer=null; } camState.proc=null; camState.refData=null; camState.suggestion=null; }
function detectTick(){
  if(!camState.auto || camState.suggestion) return;
  const cur=grabFrame(); if(!cur) return;
  if(!camState.refData){ camState.refData=cur; return; }
  const d=diffFrame(camState.refData,cur), w=cur.width, h=cur.height, A=w*h, det=camState.det;
  const compact = d.count>0 && d.bw < w*0.4 && d.bh < h*0.45;   // liten, lokal fläck = pil
  const sized = d.count>=12 && d.count <= A*0.05;               // pil-stor (ej hela bilden)
  if(!(compact && sized)){
    det.stableCount=0; det.last=null;
    if(d.count > A*0.05){ det.globalCount=(det.globalCount||0)+1; if(det.globalCount>10){ camState.refData=cur; det.globalCount=0; } }
    else det.globalCount=0;
    return;
  }
  det.globalCount=0;
  if(det.last && Math.hypot(d.cx-det.last.cx,d.cy-det.last.cy)<4) det.stableCount++; else det.stableCount=1;
  det.last={cx:d.cx,cy:d.cy};
  if(det.stableCount>=2){ det.stableCount=0; emitSuggestion(d.cx,d.cy); }
}
function emitSuggestion(cx,cy){
  const canvas=camState.canvas, proc=camState.proc; if(!canvas||!proc) return;
  const dx=cx*canvas.width/proc.width, dy=cy*canvas.height/proc.height;
  const f=boardToField(...pxToBoard(camState.points,canvas.width,canvas.height,dx,dy));
  camState.suggestion={x:dx,y:dy,f}; haptic([40]); camState.redraw&&camState.redraw();
}
function confirmSuggestion(){
  const s=camState.suggestion; if(!s||!state.match) return;
  if(camState.turnEnded){ camState.turnMarks=[]; camState.turnEnded=false; }
  camState.turnMarks=camState.turnMarks||[]; camState.turnMarks.push({x:s.x,y:s.y,label:s.f.label});
  applyThrow({val:s.f.val,label:s.f.label,isDouble:s.f.isDouble,isTreble:s.f.isTreble});
  if(state.darts.length===0) camState.turnEnded=true;
  camState.suggestion=null; DB.save('current',{match:state.match,darts:state.darts,mult:state.mult});
  const sim=simulate(state.match); if(sim.finished){ saveMatch(state.match,sim); stopCam(); go('summary'); return; }
  rearmRef(); camState.redraw&&camState.redraw();
}
function dismissSuggestion(){ camState.suggestion=null; rearmRef(); camState.redraw&&camState.redraw(); }
function toggleAuto(){ camState.auto=!camState.auto; if(camState.auto) startDetect(); else stopDetect(); camState.redraw&&camState.redraw(); }
/* — homografi (4 punkter, src->dst) i ren JS — */
function gauss(A,b){
  const n=b.length, M=A.map((r,i)=>[...r,b[i]]);
  for(let c=0;c<n;c++){
    let p=c; for(let r=c+1;r<n;r++) if(Math.abs(M[r][c])>Math.abs(M[p][c])) p=r;
    [M[c],M[p]]=[M[p],M[c]];
    const piv=M[c][c]||1e-9;
    for(let r=0;r<n;r++){ if(r===c) continue; const f=M[r][c]/piv; for(let k=c;k<=n;k++) M[r][k]-=f*M[c][k]; }
  }
  return M.map((r,i)=>r[n]/(r[i]||1e-9));
}
function solveH(src,dst){
  const A=[],b=[];
  for(let i=0;i<4;i++){ const [x,y]=src[i],[u,v]=dst[i];
    A.push([x,y,1,0,0,0,-x*u,-y*u]); b.push(u);
    A.push([0,0,0,x,y,1,-x*v,-y*v]); b.push(v);
  }
  const h=gauss(A,b);
  return [[h[0],h[1],h[2]],[h[3],h[4],h[5]],[h[6],h[7],1]];
}
function applyH(H,x,y){ const d=H[2][0]*x+H[2][1]*y+H[2][2];
  return [(H[0][0]*x+H[0][1]*y+H[0][2])/d,(H[1][0]*x+H[1][1]*y+H[1][2])/d]; }
function drawBoard(ctx,H){
  const acc=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#34D399';
  ctx.strokeStyle=acc; ctx.fillStyle=acc; ctx.lineWidth=1.8; ctx.globalAlpha=.92;
  const ring=r=>{ ctx.beginPath();
    for(let a=0;a<=360;a+=5){ const t=a*Math.PI/180,[u,v]=applyH(H,r*Math.cos(t),r*Math.sin(t)); a?ctx.lineTo(u,v):ctx.moveTo(u,v);} ctx.closePath(); ctx.stroke(); };
  [6.35,15.9,99,107,162,170].forEach(ring);
  for(let k=0;k<20;k++){ const t=((90-9-18*k)*Math.PI/180);
    const [u1,v1]=applyH(H,15.9*Math.cos(t),15.9*Math.sin(t)),[u2,v2]=applyH(H,170*Math.cos(t),170*Math.sin(t));
    ctx.beginPath(); ctx.moveTo(u1,v1); ctx.lineTo(u2,v2); ctx.stroke(); }
  ctx.globalAlpha=1; ctx.font='bold 15px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  [['20',0,150],['6',150,0],['3',0,-150],['11',-150,0]].forEach(([n,x,y])=>{ const [u,v]=applyH(H,x,y);
    ctx.lineWidth=3; ctx.strokeStyle='rgba(0,0,0,.6)'; ctx.strokeText(n,u,v); ctx.fillText(n,u,v); });
}
function camStatus(t){ const e=document.getElementById('camstatus'); if(e) e.textContent=t; }
function camButtons(list){ const e=document.getElementById('cambtns'); if(!e) return;
  e.innerHTML=list.map(([lbl,fn])=>`<button class="btn ${fn==='saveCalib'?'':'secondary'}" onclick="${fn}()">${lbl}</button>`).join(''); }
function undoTap(){ camState.points.pop(); camState.redraw&&camState.redraw(); }
function recalibrate(){ camState.points=[]; camState.lastTap=null; DB.save('camCalib',null); camState.redraw&&camState.redraw(); }
function saveCalib(){ DB.save('camCalib', camState.points.slice(0,4)); toast('Kalibrering sparad',true); camState.redraw&&camState.redraw(); }
function initCamera(){
  const vid=document.getElementById('camvid'), canvas=document.getElementById('camcanvas');
  if(!vid||!canvas) return;
  const saved=DB.load('camCalib',null);
  camState.points = saved? saved.slice() : [];
  camState.lastTap=null; camState.vid=vid; camState.canvas=canvas;
  function px(n){ return [n[0]*canvas.width, n[1]*canvas.height]; }
  function redraw(){
    canvas.width=canvas.clientWidth; canvas.height=canvas.clientHeight;
    const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height);
    if(camState.points.length>=4){
      const H=solveH(CALIB_SRC, camState.points.slice(0,4).map(px));
      drawBoard(ctx,H);
      const isSaved=!!DB.load('camCalib',null);
      const dot=(x,y)=>{ ctx.fillStyle='#fff'; ctx.strokeStyle='#34D399'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2); ctx.fill(); ctx.stroke(); };
      if(isSaved && camState.scoring && state.match){
        (camState.turnMarks||[]).forEach(mk=>dot(mk.x,mk.y));
        if(camState.suggestion){
          const sg=camState.suggestion;
          ctx.fillStyle='rgba(56,199,251,.92)'; ctx.strokeStyle='#fff'; ctx.lineWidth=3;
          ctx.beginPath(); ctx.arc(sg.x,sg.y,10,0,Math.PI*2); ctx.fill(); ctx.stroke();
          camStatus('Förslag: '+fieldText(sg.f)+' — stämmer det?');
          camButtons([['✓ Bekräfta','confirmSuggestion'],['✗ Avfärda','dismissSuggestion']]);
        } else {
          const sim=simulate(state.match), cur=sim.cur;
          const rem=sim.rem[cur]-state.darts.reduce((a,x)=>a+x.val,0);
          const thrown=(camState.turnMarks||[]).map(mk=>mk.label).join('  ')||'–';
          camStatus(state.match.config.players[cur]+' · kvar '+rem+(camState.auto?'  ·  auto på':'')+'   ['+thrown+']');
          camButtons(camState.auto
            ? [['Ångra','camScoreUndo'],['Återställ ref','rearmRef'],['Auto: på','toggleAuto']]
            : [['Ångra','camScoreUndo'],['Knappsats','backToGame'],['Auto: av','toggleAuto']]);
        }
      } else if(isSaved){
        if(camState.lastTap) dot(camState.lastTap.x,camState.lastTap.y);
        camStatus(camState.lastTap? '🎯 '+fieldText(camState.lastTap.f) : 'Tappa på en pil för att testa fältet');
        camButtons([['Kalibrera om','recalibrate'],['Stäng','closeCamera']]);
      } else {
        camStatus('Ser rutnätet rätt ut på tavlan?'); camButtons([['Spara kalibrering','saveCalib'],['Gör om','recalibrate']]);
      }
    } else {
      const ctx2=canvas.getContext('2d');
      camState.points.forEach(n=>{ const [u,v]=px(n); ctx2.fillStyle='#34D399'; ctx2.beginPath(); ctx2.arc(u,v,8,0,Math.PI*2); ctx2.fill(); ctx2.strokeStyle='#fff'; ctx2.lineWidth=2; ctx2.stroke(); });
      camStatus('Tappa ytterkanten på '+CALIB_PROMPTS[camState.points.length]);
      camButtons(camState.points.length? [['Ångra senaste','undoTap']] : []);
    }
  }
  camState.redraw=redraw;
  canvas.onclick=e=>{
    const r=canvas.getBoundingClientRect();
    const x=e.clientX-r.left, y=e.clientY-r.top;
    if(camState.points.length<4){ camState.points.push([x/r.width,y/r.height]); camState.lastTap=null; redraw(); return; }
    const cx=x*canvas.width/r.width, cy=y*canvas.height/r.height;
    const f=boardToField(...pxToBoard(camState.points, canvas.width, canvas.height, cx, cy));
    if(camState.scoring && state.match){
      if(camState.turnEnded){ camState.turnMarks=[]; camState.turnEnded=false; }
      camState.turnMarks=camState.turnMarks||[]; camState.turnMarks.push({x:cx,y:cy,label:f.label});
      applyThrow({val:f.val,label:f.label,isDouble:f.isDouble,isTreble:f.isTreble});
      if(state.darts.length===0) camState.turnEnded=true;
      camState.suggestion=null; if(camState.auto) rearmRef();
      DB.save('current',{match:state.match,darts:state.darts,mult:state.mult});
      const sim=simulate(state.match);
      if(sim.finished){ saveMatch(state.match,sim); stopCam(); go('summary'); return; }
      redraw(); return;
    }
    camState.lastTap={x:cx,y:cy,f}; redraw();
  };
  window.addEventListener('resize', redraw);
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ camStatus('Kameran stöds inte i denna webbläsare.'); redraw(); return; }
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false})
    .then(s=>{ camState.stream=s; vid.srcObject=s; const p=vid.play&&vid.play(); if(p&&p.catch)p.catch(()=>{}); setTimeout(redraw,300); })
    .catch(err=>{ camStatus('Kunde inte öppna kameran ('+err.name+'). Tillåt kameraåtkomst och försök igen.'); });
  redraw();
}

/* ============================== nav ============================== */
function navbar(){
  if(['game','summary','trainingActive','camera'].includes(state.view)) return '';
  const items=[['home','&#127968;','Hem'],['training','&#127919;','Tr&auml;na'],['stats','&#128202;','Statistik'],['settings','&#9881;','Mer']];
  return `<div class="nav">${items.map(([v,ic,l])=>
    `<button class="${state.view===v?'on':''}" onclick="go('${v}')"><span class="ico">${ic}</span>${l}</button>`).join('')}</div>`;
}

/* ============================== render ============================== */
function render(){
  const app=$('#app');
  let html='';
  switch(state.view){
    case 'home': html=viewHome(); break;
    case 'setup': html=viewSetup(); break;
    case 'game': html=viewGame(); break;
    case 'summary': html=viewSummary(); break;
    case 'stats': html=viewStats(); break;
    case 'training': html=viewTraining(); break;
    case 'trainingActive': html=viewTrainingActive(); break;
    case 'settings': html=viewSettings(); break;
    case 'playerStats': html=viewPlayerStats(); break;
    case 'camera': html=viewCamera(); break;
    default: html=viewHome();
  }
  const c121Pad = state.view==='trainingActive' && state.training && state.training.kind==='c121' && !state.training.over;
  app.className = (state.view==='game'||c121Pad) ? 'game' : state.view==='camera' ? 'cam' : ((state.view==='trainingActive'||state.view==='summary') ? 'nonav' : '');
  document.body.classList.toggle('playing', state.view==='game'||c121Pad);
  app.innerHTML=html+navbar();
  if(state.view==='camera') requestAnimationFrame(initCamera);
  if(state.view==='game' && state.match) DB.save('current',{match:state.match,darts:state.darts,mult:state.mult});
  if(state.pendingCheckout) renderCheckoutSheet();
}

/* ============================== game actions ============================== */
function press(d){
  if(d==='back'){ state.buffer=state.buffer.slice(0,-1); render(); return; }
  if(state.buffer.length>=3) return;
  const nv=state.buffer+d;
  if(parseInt(nv)>180) return;
  state.buffer=nv; render();
}
function quickScore(v){ state.buffer=String(v); submitScore(); }

function submitScore(){
  const m=state.match, sim=simulate(m), cur=sim.cur, rem=sim.rem[cur];
  if(state.buffer===''){ return; }
  const score=parseInt(state.buffer);
  if(isNaN(score)||score>180){ toast('Max 180'); state.buffer=''; render(); return; }
  if(OMOJLIGA_SCORE.has(score)){ toast(score+' &auml;r om&ouml;jligt'); state.buffer=''; render(); return; }
  const newRem=rem-score;
  const bust = newRem<0 || (newRem===1 && m.config.outRule==='double');
  if(bust){ m.turns.push({score,darts:3,bust:true}); state.buffer=''; toast('Bust!'); render(); return; }
  if(newRem===0){
    // checkout — ask darts used (for best-leg & checkout %)
    state.pendingCheckout={score}; render(); return;
  }
  m.turns.push({score,darts:3}); state.buffer=''; render();
}
function renderCheckoutSheet(){
  const el=document.createElement('div'); el.className='overlay';
  el.innerHTML=`<div class="sheet"><h3>Utg&aring;ng! Hur m&aring;nga pilar?</h3>
    <div class="row" style="gap:10px">
      ${[1,2,3].map(n=>`<button class="btn" onclick="confirmCheckout(${n})">${n}</button>`).join('')}
    </div></div>`;
  document.body.appendChild(el); el._oche=true;
}
function confirmCheckout(darts){
  const m=state.match, pc=state.pendingCheckout;
  m.turns.push({score:pc.score,darts,checkout:true});
  state.pendingCheckout=null; state.buffer='';
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
  toast('Leg vunnen!',true); render();
}
function undo(){
  const m=state.match;
  if(state.darts.length>0){ state.darts=[]; state.mult='S'; render(); return; }
  if(!m.turns.length){ toast('Inget att ångra'); return; }
  m.turns.pop(); state.mult='S'; render();
}
function setMult(k){ state.mult = state.mult===k? 'S' : k; render(); }
function dartFromNum(n){ const m=state.mult; state.mult='S';
  if(m==='D') return {val:n*2,label:'D'+n,isDouble:true,isTreble:false};
  if(m==='T') return {val:n*3,label:'T'+n,isDouble:false,isTreble:true};
  return {val:n,label:'S'+n,isDouble:false,isTreble:false};
}
function tapNumber(n){ addDart(dartFromNum(n)); }
function tapVal(val,label,isDouble){ state.mult='S'; addDart({val,label,isDouble,isTreble:false}); }
function applyThrow(d){
  const m=state.match, sim=simulate(m), cur=sim.cur;
  const startRem=sim.rem[cur];
  const used=state.darts.reduce((a,x)=>a+x.val,0);
  const curRem=startRem-used;
  const newRem=curRem-d.val;
  const outR=m.config.outRule;
  const validFinish = outR==='single' ? true : outR==='double' ? d.isDouble : (d.isDouble||d.isTreble);
  const dartsThrown=state.darts.length+1;
  const throwsArr=[...state.darts,d].map(x=>({v:x.val,db:!!x.isDouble}));
  if(newRem<0 || (newRem===1 && outR==='double') || (newRem===0 && !validFinish)){
    m.turns.push({score:0,darts:dartsThrown,bust:true,throws:throwsArr});
    state.darts=[]; state.mult='S'; toast('Bust!'); haptic([200]); return 'bust';
  }
  if(newRem===0){
    const coScore=used+d.val;
    m.turns.push({score:coScore,darts:dartsThrown,checkout:true,throws:throwsArr});
    state.darts=[]; state.mult='S'; toast('Leg vunnen!',true); haptic([120]); caller('Game shot');
    if(coScore>=100) celebrateScore(coScore);
    return 'checkout';
  }
  state.darts.push(d);
  if(state.darts.length===3){
    const sum=state.darts.reduce((a,x)=>a+x.val,0);
    m.turns.push({score:sum,darts:3,throws:state.darts.map(x=>({v:x.val,db:!!x.isDouble}))});
    celebrateScore(sum);
    state.darts=[]; state.mult='S';
  }
  return 'ok';
}
function addDart(d){ applyThrow(d); render(); }
function backDart(){
  if(state.darts.length>0){ state.darts.pop(); render(); return; }
  undo();
}
/* ---- firande, haptik & ljud ---- */
function haptic(p){ if(DB.load('vibration',true) && navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }
function caller(text){ if(DB.load('sound',false) && window.speechSynthesis){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=0.95; speechSynthesis.speak(u);}catch(e){} } }
function celebrateScore(score){
  if(score>=180){ haptic([60,40,60,40,150]); caller('One hundred and eighty'); flash('180','c180'); confetti(); }
  else if(score>=140){ haptic([50,40,90]); flash(String(score),'c140'); }
  else if(score>=100){ haptic([50]); flash(String(score),'c100'); }
}
function flash(text,cls){ const el=document.createElement('div'); el.className='celebrate'+(cls?' '+cls:''); el.textContent=text; document.body.appendChild(el); setTimeout(()=>el.remove(),1100); }
function confetti(){
  const colors=['#34D399','#38BDF8','#FBBF24','#F87171','#A78BFA'];
  const wrap=document.createElement('div'); wrap.className='confetti';
  for(let i=0;i<40;i++){ const p=document.createElement('i');
    p.style.left=(Math.random()*100)+'%';
    p.style.background=colors[i%colors.length];
    p.style.animationDelay=(Math.random()*0.25)+'s';
    p.style.animationDuration=(0.9+Math.random()*0.8)+'s';
    wrap.appendChild(p); }
  document.body.appendChild(wrap); setTimeout(()=>wrap.remove(),2200);
}

/* ============================== training ============================== */
function startTraining(id){
  let tr;
  if(id==='atc') tr={id,kind:'seq',title:'Around the Clock',seq:Array.from({length:20},(_,i)=>String(i+1)),index:0,hits:0,throws:0};
  else if(id==='bulls') tr={id,kind:'seq',title:'Bulls Practice',seq:Array.from({length:10},()=>'Bull'),index:0,hits:0,throws:0};
  else if(id==='doubles') tr={id,kind:'seq',title:'Doubles Practice',seq:[20,16,18,17,19,15,11,14,13,12].map(n=>'D'+n),index:0,hits:0,throws:0};
  else if(id==='cricket') tr={id,kind:'cricket',title:'Cricket Training',targets:['20','19','18','17','16','15','Bull'],index:0,marks:0};
  else if(id==='scoring') tr={id,kind:'scoring',title:'Scoring Challenge',rounds:10,scores:[],index:0};
  else if(id==='trebles') tr={id,kind:'seq',title:'Trebles Practice',seq:[20,19,18,17,16,15,14,13,12,11].map(n=>'T'+n),index:0,hits:0,throws:0};
  else if(id==='halveit') tr={id,kind:'halveit',title:'Halve-it',targets:['15','16','Dubbel','17','18','Trippel','19','20','Bull'],index:0,total:40};
  else if(id==='bob27') tr={id,kind:'bob27',title:"Bob's 27",targets:[...Array.from({length:20},(_,i)=>'D'+(i+1)),'Bull'],index:0,score:27,out:false};
  else return;
  state.training=tr; state.buffer=''; go('trainingActive');
}
function startCheckout(diff){
  const namn={latt:'L&auml;tt',medel:'Medel',svar:'Sv&aring;r'}[diff]||'Medel';
  state.training={id:'checkout',kind:'checkout',difficulty:diff,title:'Checkout &middot; '+namn,
    items:genCheckouts(diff,9),index:0,success:0,attempts:0};
  state.buffer=''; go('trainingActive');
}
function genCheckouts(diff,count){
  const range = diff==='latt'?[2,40] : diff==='svar'?[100,170] : [41,99];
  const out=[]; let guard=0;
  while(out.length<count && guard++<3000){
    const n=Math.floor(Math.random()*(range[1]-range[0]+1))+range[0];
    if(checkout(n,'double').length) out.push(n);
  }
  return out;
}
function startShanghai(count){
  state.training={id:'shanghai',kind:'shanghai',title:'Shanghai (1-'+count+')',count,
    numbers:Array.from({length:count},(_,i)=>i+1),index:0,total:0,roundDarts:[],roundMults:{S:false,D:false,T:false},shanghai:false};
  state.buffer=''; go('trainingActive');
}
function startC121(darts){
  state.training={id:'c121',kind:'c121',title:'121 · '+darts+' pilar',darts,target:121,rem:121,dartsLeft:darts,visitStartRem:121,visitDarts:[],best:0,checkouts:0,over:false};
  state.mult='S'; state.buffer=''; go('trainingActive');
}
function repeatTraining(){ const tr=state.training;
  if(tr.kind==='checkout') startCheckout(tr.difficulty);
  else if(tr.kind==='shanghai') startShanghai(tr.count);
  else if(tr.kind==='c121') startC121(tr.darts);
  else startTraining(tr.id); }
function trainHit(hit){ const tr=state.training; tr.throws++; if(hit)tr.hits++; tr.index++; render(); }
function cricketMark(n){ const tr=state.training; tr.marks+=n; tr.index++; render(); }
function checkoutMark(ok){ const tr=state.training; tr.attempts++; if(ok)tr.success++; tr.index++; render(); }
function bob27Mark(k){ const tr=state.training; const t=tr.targets[tr.index]; const val=t==='Bull'?50:2*parseInt(t.slice(1));
  if(k>0) tr.score+=k*val; else tr.score-=val;
  if(tr.score<=0){ tr.score=0; tr.out=true; tr.label=t; }
  tr.index++; render(); }
function nextCheckout(start, up){
  let n=Math.max(2,Math.min(170,start));
  for(let i=0;i<300;i++){
    if(n>=2 && n<=170 && checkout(n,'double').length) return n;
    n += up?1:-1; if(n<2) n=2; if(n>170) n=170;
  }
  return 40;
}
function c121Dart(d){
  const tr=state.training; if(!tr||tr.over) return; state.mult='S';
  const newRem=tr.rem-d.val;
  if(newRem===0 && d.isDouble){ // utgång på dubbel!
    tr.checkouts++; tr.best=Math.max(tr.best,tr.target);
    haptic([120]); caller('Game shot'); if(tr.target>=100) celebrateScore(tr.target);
    tr.target=nextCheckout(tr.target+1,true); tr.rem=tr.target; tr.dartsLeft=tr.darts; tr.visitStartRem=tr.target; tr.visitDarts=[];
    toast('Utgång! Nästa: '+tr.target,true); render(); return;
  }
  tr.dartsLeft--;
  if(newRem<0 || newRem===1 || newRem===0){ toast('Bust!'); haptic([200]); tr.rem=tr.visitStartRem; tr.visitDarts=[]; }
  else { tr.rem=newRem; tr.visitDarts.push(d); if(tr.visitDarts.length>=3){ tr.visitStartRem=tr.rem; tr.visitDarts=[]; } }
  if(tr.dartsLeft<=0) tr.over=true;
  render();
}
function c121Num(n){ c121Dart(dartFromNum(n)); }
function c121Val(val,label,isDouble){ state.mult='S'; c121Dart({val,label,isDouble,isTreble:false}); }
function c121Back(){ const tr=state.training; if(tr.visitDarts.length>0){ const d=tr.visitDarts.pop(); tr.rem+=d.val; tr.dartsLeft++; } render(); }
function scoringSubmit(){ const tr=state.training; if(state.buffer==='')return; let s=parseInt(state.buffer);
  if(isNaN(s))s=0; if(s>180){toast('Max 180');state.buffer='';render();return;}
  tr.scores.push(s); tr.index++; state.buffer=''; render(); }
function halveitSubmit(){ const tr=state.training; if(state.buffer==='')return; let s=parseInt(state.buffer);
  if(isNaN(s))s=0; if(s>180){toast('Max 180');state.buffer='';render();return;}
  if(s===0){ tr.total=Math.floor(tr.total/2); toast('Halverat!'); haptic([200]); } else { tr.total+=s; if(s>=100) celebrateScore(s); }
  tr.index++; state.buffer=''; render(); }
function shanghaiHit(m){ const tr=state.training; if(tr.roundDarts.length>=3) return; const n=tr.numbers[tr.index];
  let val=0,label='Miss';
  if(m==='S'){ val=n; label='S'+n; tr.roundMults.S=true; }
  else if(m==='D'){ val=n*2; label='D'+n; tr.roundMults.D=true; }
  else if(m==='T'){ val=n*3; label='T'+n; tr.roundMults.T=true; }
  tr.roundDarts.push({val,label}); tr.total+=val;
  if(tr.roundMults.S&&tr.roundMults.D&&tr.roundMults.T){ tr.shanghai=true; haptic([60,40,60,40,150]); caller('Shanghai'); flash('SHANGHAI!','word'); confetti(); render(); return; }
  if(tr.roundDarts.length>=3){ tr.index++; tr.roundDarts=[]; tr.roundMults={S:false,D:false,T:false}; }
  render(); }
function shanghaiBack(){ const tr=state.training; if(tr.roundDarts.length>0){ const d=tr.roundDarts.pop(); tr.total-=d.val;
  tr.roundMults={S:false,D:false,T:false}; tr.roundDarts.forEach(x=>{ const c=x.label[0]; if(c==='S')tr.roundMults.S=true; if(c==='D')tr.roundMults.D=true; if(c==='T')tr.roundMults.T=true; }); render(); } }
function saveTrainingResult(modeId,title,score){
  const tr=state.training; if(!tr||tr.saved)return; tr.saved=true;
  const hist=DB.load('training',[]);
  hist.push({id:modeId,title,score,date:Date.now()});
  DB.save('training',hist);
}
function trainingPBs(){
  const hist=DB.load('training',[]); const pb={};
  hist.forEach(h=>{ pb[h.id] = pb[h.id]==null? h.score : Math.max(pb[h.id],h.score); });
  return pb;
}

function resetTrainingPB(id){
  if(!confirm('Nollställa rekordet för detta läge?')) return;
  const hist=DB.load('training',[]).filter(h=>h.id!==id);
  DB.save('training',hist); toast('Rekord nollställt',true); render();
}
function resetAllTrainingPB(){
  if(!confirm('Nollställa ALLA träningsrekord?')) return;
  DB.save('training',[]); toast('Alla rekord nollställda',true); render();
}

/* ============================== statistik-hjälp & export ============================== */
function aggStats(hist){
  const agg={};
  for(const m of hist){ const sim=simulate(m);
    m.config.players.forEach((p,i)=>{ const st=sim.stats[i];
      const a=agg[p]||(agg[p]={score:0,darts:0,c180:0,c140:0,highCO:0,bestLeg:null,legsWon:0,setsWon:0,matches:0,wins:0,doubleAtt:0,doubleHit:0});
      a.score+=st.score; a.darts+=st.darts; a.c180+=st.c180; a.c140+=st.c140;
      a.highCO=Math.max(a.highCO,st.highCO); a.legsWon+=st.legsWon; a.setsWon+=st.setsWon; a.matches++;
      a.doubleAtt+=st.doubleAtt; a.doubleHit+=st.doubleHit;
      if(st.bestLeg!=null) a.bestLeg = a.bestLeg==null?st.bestLeg:Math.min(a.bestLeg,st.bestLeg);
      if(sim.winner===i) a.wins++;
    });
  }
  return agg;
}
function playerAvgSeries(hist,name){
  const vals=[];
  hist.forEach(m=>{ const i=m.config.players.indexOf(name); if(i<0)return;
    const st=simulate(m).stats[i]; if(st.darts) vals.push(st.score/st.darts*3); });
  return vals;
}
function jsq(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function openPlayerStats(name){ state.statsPlayer=name; go('playerStats'); }
function playerDetail(hist,name){
  const D={matches:0,wins:0,legs:0,sets:0,darts:0,points:0,c180:0,c140:0,c100:0,
    bands:[0,0,0,0,0,0],first9:0,first9d:0,bestLeg:null,worstLeg:null,wonLegSum:0,
    checkouts:[],highCO:0,doubleAtt:0,doubleHit:0,avgSeries:[],byStart:{}};
  hist.forEach(m=>{ const i=m.config.players.indexOf(name); if(i<0)return;
    const sim=simulate(m), st=sim.stats[i];
    D.matches++; if(sim.winner===i) D.wins++;
    D.legs+=st.legsWon; D.sets+=st.setsWon; D.darts+=st.darts; D.points+=st.score;
    D.c180+=st.c180; D.c140+=st.c140; D.c100+=st.c100;
    for(let b=0;b<6;b++) D.bands[b]+=st.bands[b];
    D.first9+=st.first9; D.first9d+=st.first9d;
    D.doubleAtt+=st.doubleAtt; D.doubleHit+=st.doubleHit;
    D.highCO=Math.max(D.highCO,st.highCO);
    if(st.bestLeg!=null) D.bestLeg=D.bestLeg==null?st.bestLeg:Math.min(D.bestLeg,st.bestLeg);
    if(st.worstLeg!=null) D.worstLeg=D.worstLeg==null?st.worstLeg:Math.max(D.worstLeg,st.worstLeg);
    D.wonLegSum+=st.wonLegSum;
    st.checkouts.forEach(c=>D.checkouts.push(c));
    if(st.darts) D.avgSeries.push(st.score/st.darts*3);
    const bs=D.byStart[m.config.startScore]||(D.byStart[m.config.startScore]={score:0,darts:0,legs:0,matches:0});
    bs.score+=st.score; bs.darts+=st.darts; bs.legs+=st.legsWon; bs.matches++;
  });
  return D;
}
function distBars(bands){
  const labels=['180','140-179','100-139','60-99','1-59','Bust'];
  const max=Math.max(1,...bands);
  return `<div class="dist">${bands.map((v,i)=>`
    <div class="distrow"><span class="distlbl">${labels[i]}</span>
      <span class="distbar"><span style="width:${Math.round(v/max*100)}%"></span></span>
      <span class="distval">${v}</span></div>`).join('')}</div>`;
}
function startTable(byStart){
  const ids=Object.keys(byStart).sort((a,b)=>a-b);
  if(!ids.length) return '';
  return `<div class="card"><div class="label">Per speltyp</div>
    <table class="ptable"><thead><tr><th>Start</th><th>Matcher</th><th>3-pilssnitt</th><th>Legs</th></tr></thead><tbody>
    ${ids.map(id=>{const b=byStart[id];return `<tr><td>${id}</td><td>${b.matches}</td><td>${fmt1(b.darts?b.score/b.darts*3:0)}</td><td>${b.legs}</td></tr>`;}).join('')}
    </tbody></table></div>`;
}
function viewPlayerStats(){
  const name=state.statsPlayer||''; const hist=DB.load('matches',[]);
  const D=playerDetail(hist,name);
  if(!D.matches) return topbar(esc(name))+`<div class="view">
    <button class="btn ghost" style="margin-bottom:12px" onclick="go('stats')">&#8592; Tillbaka</button>
    <div class="empty">Ingen data f&ouml;r ${esc(name)}.</div></div>`;
  const avg3=D.darts?D.points/D.darts*3:0;
  const first9=D.first9d?D.first9/D.first9d*3:0;
  const coPct=D.doubleAtt?Math.round(D.doubleHit/D.doubleAtt*100):null;
  const dartsLeg=D.legs?D.wonLegSum/D.legs:0;
  const topCO=[...D.checkouts].sort((a,b)=>b-a).slice(0,8);
  return topbar(esc(name))+`<div class="view">
    <button class="btn ghost" style="margin-bottom:12px" onclick="go('stats')">&#8592; Tillbaka till statistik</button>
    <div class="card" style="text-align:center;border-color:var(--accent)">
      <div style="font-size:22px;font-weight:700">${esc(name)}</div>
      <div class="muted">${D.matches} matcher &middot; ${D.wins} vinster (${Math.round(D.wins/D.matches*100)}%)</div>
    </div>
    <div class="card"><div class="label">Prestation</div>
      <div class="statgrid">
        <div class="stat"><div class="v">${fmt1(avg3)}</div><div class="k">3-pilssnitt</div></div>
        <div class="stat"><div class="v">${fmt1(first9)}</div><div class="k">F&ouml;rsta 9-snitt</div></div>
        <div class="stat"><div class="v">${coPct!=null?coPct+'%':'—'}</div><div class="k">Checkout %</div></div>
        <div class="stat"><div class="v">${dartsLeg?fmt1(dartsLeg):'—'}</div><div class="k">Snitt pilar/leg</div></div>
        <div class="stat"><div class="v">${D.bestLeg||'—'}</div><div class="k">B&auml;sta leg</div></div>
        <div class="stat"><div class="v">${D.worstLeg||'—'}</div><div class="k">S&auml;msta leg</div></div>
      </div>
    </div>
    <div class="card"><div class="label">R&auml;knare</div>
      <div class="statgrid">
        <div class="stat"><div class="v">${D.c180}</div><div class="k">180:or</div></div>
        <div class="stat"><div class="v">${D.c140}</div><div class="k">140+</div></div>
        <div class="stat"><div class="v">${D.c100}</div><div class="k">Tons (100+)</div></div>
        <div class="stat"><div class="v">${D.highCO||'—'}</div><div class="k">H&ouml;gsta checkout</div></div>
        <div class="stat"><div class="v">${D.legs}</div><div class="k">Vunna legs</div></div>
        <div class="stat"><div class="v">${D.sets}</div><div class="k">Vunna sets</div></div>
        <div class="stat"><div class="v">${D.darts}</div><div class="k">Totalt pilar</div></div>
        <div class="stat"><div class="v">${D.points.toLocaleString('sv-SE')}</div><div class="k">Totalt po&auml;ng</div></div>
      </div>
    </div>
    <div class="card"><div class="label">Po&auml;ngf&ouml;rdelning (per tur)</div>${distBars(D.bands)}</div>
    ${topCO.length?`<div class="card"><div class="label">H&ouml;gsta checkouts</div>
      <div class="chips" style="flex-wrap:wrap">${topCO.map(c=>`<span class="badge" style="font-size:15px;padding:6px 12px">${c}</span>`).join('')}</div></div>`:''}
    <div class="card"><div class="label">Snittutveckling per match</div>${sparkSVG(D.avgSeries)}</div>
    ${startTable(D.byStart)}
  </div>`;
}
function sparkSVG(vals){
  if(vals.length<2) return `<div class="muted" style="font-size:12px">F&ouml;r lite data f&ouml;r graf &auml;n.</div>`;
  const w=300,h=72,pad=8; const max=Math.max(...vals),min=Math.min(...vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>[pad+i*(w-2*pad)/(vals.length-1), h-pad-(v-min)/rng*(h-2*pad)]);
  const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="var(--accent)"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" style="margin-top:6px">
    <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2"/>${dots}
    <text x="${pad}" y="12" fill="var(--txt2)" font-size="10">${fmt1(max)}</text>
    <text x="${pad}" y="${h-2}" fill="var(--txt2)" font-size="10">${fmt1(min)}</text></svg>`;
}
function download(name, blob){
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}
function exportCSV(){
  const hist=DB.load('matches',[]); if(!hist.length){toast('Ingen data');return;}
  const rows=[['Datum','Spelare','Start','Ut-regel','3-pilssnitt','180','140+','Checkout%','Hogsta checkout','Basta leg','Vunna legs','Vunna sets','Vinnare']];
  hist.forEach(m=>{ const sim=simulate(m);
    m.config.players.forEach((p,i)=>{ const st=sim.stats[i];
      rows.push([new Date(m.date).toLocaleString('sv-SE'),p,m.config.startScore,ruleName(m.config.outRule),
        fmt1(st.avg),st.c180,st.c140,(st.doubleAtt?Math.round(st.doubleHit/st.doubleAtt*100)+'%':''),st.highCO,st.bestLeg||'',st.legsWon,st.setsWon, sim.winner===i?'JA':'']);
    });
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
  download('oche-statistik.csv', new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
  toast('CSV exporterad',true);
}
function exportPDF(){
  const hist=DB.load('matches',[]); if(!hist.length){toast('Ingen data');return;}
  const agg=aggStats(hist);
  const rows=Object.entries(agg).sort((a,b)=>b[1].matches-a[1].matches).map(([n,a])=>
    `<tr><td>${n}</td><td>${a.matches}</td><td>${a.wins}</td><td>${fmt1(a.darts?a.score/a.darts*3:0)}</td><td>${a.c180}</td><td>${a.c140}</td><td>${a.doubleAtt?Math.round(a.doubleHit/a.doubleAtt*100)+'%':'-'}</td><td>${a.highCO||'-'}</td><td>${a.bestLeg||'-'}</td><td>${a.legsWon}</td></tr>`).join('');
  const html=`<!DOCTYPE html><html lang="sv"><head><meta charset="utf-8"><title>Oche statistik</title>
    <style>body{font-family:Arial,Helvetica,sans-serif;color:#111;padding:28px}h1{color:#0E9F6E;margin:0}
    p{color:#555}table{border-collapse:collapse;width:100%;margin-top:14px}
    th,td{border:1px solid #ccc;padding:8px 10px;text-align:left;font-size:13px}th{background:#f2f2f2}</style></head>
    <body><h1>Oche &mdash; Statistikrapport</h1>
    <p>Genererad ${new Date().toLocaleString('sv-SE')} &middot; ${hist.length} matcher</p>
    <table><thead><tr><th>Spelare</th><th>Matcher</th><th>Vinster</th><th>3-pilssnitt</th><th>180</th><th>140+</th><th>Checkout%</th><th>Hogsta CO</th><th>Basta leg</th><th>Vunna legs</th></tr></thead>
    <tbody>${rows}</tbody></table></body></html>`;
  const w=window.open('','_blank');
  if(!w){ toast('Tillåt popup för PDF'); return; }
  w.document.write(html); w.document.close(); w.focus();
  setTimeout(()=>{ try{w.print();}catch(e){} }, 400);
}

/* ============================== keyboard ============================== */
document.addEventListener('keydown',e=>{
  const k = (state.view==='trainingActive' && state.training) ? state.training.kind : null;
  const numEntry = (k==='scoring' || k==='halveit');
  if(!numEntry || state.pendingCheckout) return;
  if(e.key>='0'&&e.key<='9') press(e.key);
  else if(e.key==='Enter'){ k==='halveit'? halveitSubmit() : scoringSubmit(); }
  else if(e.key==='Backspace'){ e.preventDefault(); press('back'); }
});
